name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: NPM_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        shell: bash
        run: |
          for i in {1..5}; do
            if npm ci; then
              exit 0
            fi
            echo "npm ci failed (attempt $i/5). Retrying in 15s..."
            sleep 15
          done
          echo "npm ci failed after 5 attempts"
          exit 1

      - name: Build
        run: npm run build

      - name: Prepare for publish
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            delete pkg.workspaces;
            delete pkg.scripts;
            delete pkg.devDependencies;
            delete pkg.dependencies['@deck-ide/shared'];
            delete pkg.bundledDependencies;
            // Include resolved @deck-ide/shared in the package
            if (!pkg.files.includes('node_modules/@deck-ide/')) {
              pkg.files.push('node_modules/@deck-ide/');
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # Resolve workspace symlink to real files for node_modules inclusion
          cp -rL node_modules/@deck-ide node_modules/@deck-ide-resolved 2>/dev/null || true
          rm -rf node_modules/@deck-ide
          mv node_modules/@deck-ide-resolved node_modules/@deck-ide 2>/dev/null || true

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create staging directory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force staging
          # 7zipでzip化（長いパスにも対応）
          $7z = "C:\Program Files\7-Zip\7z.exe"
          & $7z a -tzip staging\app.zip bin dist src web node_modules package.json
          if ($LASTEXITCODE -ne 0) { throw "7z failed with exit code $LASTEXITCODE" }
          Write-Host "app.zip size: $((Get-Item staging\app.zip).Length) bytes"

      - name: Download Node.js portable exe
        shell: pwsh
        run: |
          $nodeVersion = "22.14.0"
          $url = "https://nodejs.org/dist/v$nodeVersion/node-v$nodeVersion-win-x64.zip"
          Write-Host "Downloading Node.js $nodeVersion..."
          Invoke-WebRequest -Uri $url -OutFile node_dist.zip
          Expand-Archive -Path node_dist.zip -DestinationPath node_tmp -Force
          Copy-Item "node_tmp\node-v$nodeVersion-win-x64\node.exe" "staging\node.exe"

      - name: Copy LICENSE to installer dir
        shell: pwsh
        run: Copy-Item LICENSE installer\LICENSE

      - name: Install NSIS
        run: choco install nsis -y

      - name: Get version tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # NSIファイルをUTF-8 BOM付きで書き直し（日本語文字化け対策）
          $nsi = Get-Content installer\installer.nsi -Raw -Encoding UTF8
          [System.IO.File]::WriteAllText(
            (Resolve-Path "installer\installer.nsi").Path,
            $nsi,
            [System.Text.UTF8Encoding]::new($true)
          )
          $staging = (Resolve-Path "staging").Path
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DVERSION=${{ steps.version.outputs.VERSION }}" `
            "/DSTAGING_DIR=$staging" `
            "installer\installer.nsi"
          if ($LASTEXITCODE -ne 0) { throw "NSIS failed with exit code $LASTEXITCODE" }

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: installer/DeckIDE-Setup-${{ steps.version.outputs.VERSION }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
